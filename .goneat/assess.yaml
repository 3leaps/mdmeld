# goneat Assess Configuration
# See: goneat docs show assess/lint-shell-make-gha
version: 1
lint:
  shell:
    shfmt:
      enabled: true
      fix: false
    shellcheck:
      enabled: false
  github_actions:
    actionlint:
      enabled: true
  make:
    checkmake:
      enabled: true
      config:
        max_body_length: 60
        min_phony_targets: ["all", "clean", "test", "help"]
